name: Deploy the website to Github Pages

on:
  push:
    branches: ["zine", "main"]
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Change if you need git info
      - name: Setup Custom Zine
        run: |
          curl -L https://github.com/zigcc/zine/releases/download/v0.1.0/zine-v0.1.0-x86_64-linux.tar.gz -o zine.tar.gz
          tar -xzf zine.tar.gz
          sudo mv zine /usr/local/bin/


      - name: Build
        run: |
          zine release
          # https://gohugo.io/tools/search/
          # https://pagefind.app/docs/
          npx -y pagefind --site public --force-language zh-cn

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
